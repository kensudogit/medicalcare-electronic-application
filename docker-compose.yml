# Docker Compose設定ファイル - 医療系電子申請システムの全体環境構築（性能最適化版）

services:
  # Redis キャッシュサービス
  redis:
    image: redis:7-alpine
    container_name: medicalcare-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - medicalcare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # PostgreSQLデータベースサービス（性能最適化）
  postgres:
    image: postgres:15-alpine
    container_name: medicalcare-postgres
    environment:
      POSTGRES_DB: medicalcare_db
      POSTGRES_USER: medicalcare_user
      POSTGRES_PASSWORD: medicalcare_password
      # 性能最適化設定
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # メモリ最適化
      shared_buffers: 256MB
      effective_cache_size: 1GB
      maintenance_work_mem: 64MB
      checkpoint_completion_target: 0.9
      wal_buffers: 16MB
      default_statistics_target: 100
      random_page_cost: 1.1
      effective_io_concurrency: 200
      work_mem: 4MB
      min_wal_size: 1GB
      max_wal_size: 4GB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - medicalcare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicalcare_user -d medicalcare_db"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Spring Bootバックエンドサービス（性能最適化）
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      no_cache: true
    container_name: medicalcare-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medicalcare_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: medicalcare_user
      SPRING_DATASOURCE_PASSWORD: medicalcare_password
      SPRING_PROFILES_ACTIVE: docker
      # JVM性能最適化
      JAVA_OPTS: "-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:+OptimizeStringConcat -Djava.security.egd=file:/dev/./urandom"
      # Redis接続設定
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_TIMEOUT: 2000ms
      # データベース接続プール最適化
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1200000
      # アプリケーション設定
      SERVER_TOMCAT_THREADS_MAX: 200
      SERVER_TOMCAT_THREADS_MIN_SPARE: 10
      SERVER_TOMCAT_ACCEPT_COUNT: 100
      SERVER_TOMCAT_MAX_CONNECTIONS: 8192
      # 医療画像AIサービス
      AI_IMAGING_BASE_URL: http://ai-imaging:8090
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-imaging:
        condition: service_healthy
    networks:
      - medicalcare-network
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # FastAPI 医療画像AI認識サービス
  ai-imaging:
    build:
      context: ./ai-imaging-service
      dockerfile: Dockerfile
    container_name: medicalcare-ai-imaging
    environment:
      AI_DEFAULT_PROVIDER: inhouse
      AI_ENABLE_MOCK_INFERENCE: "true"
      AI_UPLOAD_DIR: /app/uploads/ai-imaging
      AI_PREVIEW_DIR: /app/uploads/ai-imaging/previews
    ports:
      - "8090:8090"
    volumes:
      - ./uploads/ai-imaging:/app/uploads/ai-imaging
    networks:
      - medicalcare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Next.jsフロントエンドサービス（性能最適化）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      no_cache: true
    container_name: medicalcare-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8081/api
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # Node.js性能最適化
      NODE_OPTIONS: "--max-old-space-size=1024"
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - medicalcare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Nginx リバースプロキシ（ロードバランサー）
  nginx:
    image: nginx:alpine
    container_name: medicalcare-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - ai-imaging
    networks:
      - medicalcare-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

# ボリューム定義 - データの永続化
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ネットワーク定義 - サービス間通信
networks:
  medicalcare-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/16 