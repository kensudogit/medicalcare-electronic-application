# Docker環境用アプリケーション設定
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medicalcare_db}
    username: ${SPRING_DATASOURCE_USERNAME:medicalcare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:medicalcare_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ファイルアップロード設定
app:
  file:
    upload:
      path: /app/uploads
      max-size: 10485760  # 10MB
      allowed-types: pdf,jpg,jpeg,png,doc,docx

# ログ設定
logging:
  level:
    com.medicalcare: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# サーバー設定
server:
  port: 8080
  servlet:
    context-path: / 