# Spring Boot アプリケーション設定 - Docker環境用（簡素化版）

spring:
  # データベース設定
  datasource:
    url: jdbc:postgresql://postgres:5432/medicalcare_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME:medicalcare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:medicalcare_password}
    driver-class-name: org.postgresql.Driver
    # HikariCP コネクションプール設定
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:20000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1200000}
  
  # JPA設定
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  # Redis設定
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: 2000ms
  
  # キャッシュ設定
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1時間
      cache-null-values: false
  
  # ファイルアップロード設定
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
      enabled: true

# サーバー設定
server:
  port: 8080
  servlet:
    context-path: /api

# ログ設定
logging:
  level:
    root: INFO
    com.medicalcare: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator設定（監視・管理）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# 医療画像AIサービス（FastAPI）
ai:
  imaging:
    base-url: ${AI_IMAGING_BASE_URL:http://ai-imaging:8090}

security:
  phi:
    pepper: ${PHI_PEPPER:medicalcare-phi-pepper-change-me-in-production}
  encryption:
    enabled: ${ENCRYPTION_ENABLED:true}
    key-base64: ${ENCRYPTION_KEY_BASE64:}

# PACS / 電子カルテ連携
integration:
  pacs:
    enabled: ${INTEGRATION_PACS_ENABLED:false}
    ae-title: MEDICALCARE_SCU
    remote-host: ${INTEGRATION_PACS_HOST:localhost}
    remote-port: ${INTEGRATION_PACS_PORT:11112}
    dicomweb-base-url: ${DICOMWEB_BASE_URL:}
  ehr:
    enabled: ${INTEGRATION_EHR_ENABLED:false}
    base-url: ${INTEGRATION_EHR_BASE_URL:http://localhost:8089/fhir}
    system: MedicalCareImaging

file:
  upload:
    max-size: 100MB
    allowed-types: pdf,doc,docx,jpg,jpeg,png,bmp,tif,tiff,webp,dcm,dicom
    upload-dir: ./uploads
